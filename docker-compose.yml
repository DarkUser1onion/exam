version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./app.db
      - SECRET_KEY=change_this_in_production_123!
    volumes:
      - ./app.db:/app/app.db
    restart: unless-stopped
